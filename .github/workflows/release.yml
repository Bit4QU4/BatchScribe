name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # Install the exact locked dependency set, not a fresh resolution.
      # The export carries hashes, which puts pip in --require-hashes mode,
      # so the unhashed build tools go in a separate invocation.
      - name: Install dependencies from lockfile
        run: |
          pip install uv
          uv export --frozen --no-dev --no-emit-project --output-file requirements-ci.txt
          pip install -r requirements-ci.txt
          pip install pyinstaller==6.20.0 pytest

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Build one-dir bundle
        run: pyinstaller main.spec --noconfirm

      - name: Zip bundle
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:REF_NAME.TrimStart("v")
          Compress-Archive -Path dist/BatchScribe -DestinationPath "BatchScribe-$version-windows-x64.zip"
          "ZIP_NAME=BatchScribe-$version-windows-x64.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ZIP_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          draft: false
